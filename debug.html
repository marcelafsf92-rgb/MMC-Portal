<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Diagnóstico de tela — MMC</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,system-ui,sans-serif;background:#0f172a;color:#fff;font-size:15px}
  /* Faixas coloridas mostrando onde ficam as areas seguras */
  .topbar{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top);background:#ef4444;z-index:10}
  .botbar{position:fixed;bottom:0;left:0;right:0;height:env(safe-area-inset-bottom);background:#10b981;z-index:10}
  .wrap{padding:calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 12px)}
  h1{font-size:17px;margin-bottom:4px}
  .sub{color:#93a1c6;font-size:12.5px;margin-bottom:14px;line-height:1.5}
  table{width:100%;border-collapse:collapse;font-size:15px}
  td{padding:9px 6px;border-bottom:1px solid rgba(255,255,255,.12)}
  td:first-child{color:#93a1c6}
  td:last-child{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;color:#F5A623}
  .leg{margin-top:14px;font-size:12.5px;color:#93a1c6;line-height:1.6}
  .dot{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;margin-right:5px}
</style>
</head>
<body>
<div class="topbar"></div>
<div class="botbar"></div>
<div class="wrap">
  <h1>Diagnóstico de tela</h1>
  <p class="sub">Manda um print desta tela. Os números dizem exatamente o que o seu iPhone reserva.</p>
  <table id="t"></table>
  <p class="leg">
    <span class="dot" style="background:#ef4444"></span>faixa vermelha no topo = área reservada do notch<br>
    <span class="dot" style="background:#10b981"></span>faixa verde embaixo = área reservada do risquinho<br>
    Se a faixa verde estiver <b>grossa</b>, é ela que está comendo o espaço.
  </p>
</div>
<script>
  function px(v){return Math.round(parseFloat(v)||0)+'px'}
  const cs=getComputedStyle(document.querySelector('.topbar'));
  const cb=getComputedStyle(document.querySelector('.botbar'));
  const d=document.createElement('div');
  d.style.cssText='position:fixed;height:100dvh;visibility:hidden';document.body.appendChild(d);
  const dvh=d.getBoundingClientRect().height;
  const standalone=(window.navigator.standalone===true)||matchMedia('(display-mode: standalone)').matches;
  const linhas=[
    ['Reserva do topo (safe-top)', px(cs.height)],
    ['Reserva de baixo (safe-bottom)', px(cb.height)],
    ['Altura da janela (innerHeight)', Math.round(innerHeight)+'px'],
    ['Altura 100dvh', Math.round(dvh)+'px'],
    ['Altura da tela (screen)', Math.round(screen.height)+'px'],
    ['Largura', Math.round(innerWidth)+'px'],
    ['Modo app instalado?', standalone?'SIM':'não (Safari)'],
    ['Pixel ratio', (devicePixelRatio||1)]
  ];
  document.getElementById('t').innerHTML=linhas.map(l=>'<tr><td>'+l[0]+'</td><td>'+l[1]+'</td></tr>').join('');
</script>
</body>
</html>
