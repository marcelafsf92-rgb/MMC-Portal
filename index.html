<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MMC Locações — Portal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#1E3A8A;--gold:#F5A623;--bg:#0f172a;--sidebar:68px;--sidebar-open:220px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);height:100vh;overflow:hidden;display:flex;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

    /* Sidebar */
    .sidebar{width:var(--sidebar);min-width:var(--sidebar);height:100vh;background:linear-gradient(180deg,#0f1b3d 0%,#162350 100%);display:flex;flex-direction:column;align-items:center;padding:12px 0;transition:width .25s cubic-bezier(.4,0,.2,1),min-width .25s;overflow:hidden;z-index:100;border-right:1px solid rgba(245,166,35,.15)}
    .sidebar.open{width:var(--sidebar-open);min-width:var(--sidebar-open)}
    .sidebar.open .nav-label{opacity:1;width:auto}
    .sidebar.open .sb-logo-text{display:block}

    /* Logo */
    .sb-logo{padding:8px 0 16px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:100%}
    .sb-logo img{height:38px;object-fit:contain}
    .sb-logo-text{display:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:#fff;letter-spacing:.5px;white-space:nowrap}

    /* Nav items */
    .sb-nav{flex:1;display:flex;flex-direction:column;gap:4px;width:100%;padding:0 8px}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer;transition:all .18s;color:rgba(255,255,255,.5);text-decoration:none;position:relative;min-height:48px}
    .nav-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}
    .nav-item.active{background:rgba(245,166,35,.15);color:var(--gold)}
    .nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:24px;background:var(--gold);border-radius:0 4px 4px 0}
    .nav-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-icon svg{width:22px;height:22px}
    .nav-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.3px;white-space:nowrap;opacity:0;width:0;overflow:hidden;transition:opacity .2s}

    /* Toggle */
    .sb-toggle{padding:12px;cursor:pointer;color:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;transition:color .15s}
    .sb-toggle:hover{color:rgba(255,255,255,.7)}
    .sb-toggle svg{width:20px;height:20px;transition:transform .25s}
    .sidebar.open .sb-toggle svg{transform:rotate(180deg)}

    /* Content */
    .content{flex:1;height:100vh;position:relative}
    .panel-frame{position:absolute;inset:0;border:none;width:100%;height:100%;display:none}
    .panel-frame.active{display:block}

    /* Mobile - bottom tab bar instead of sidebar */
    @media(max-width:768px){
      .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%!important;min-width:100%!important;height:60px;flex-direction:row;padding:0;border-right:none;border-top:2px solid rgba(245,166,35,.3);z-index:200}
      .sidebar.open{width:100%!important;min-width:100%!important;box-shadow:none}
      .sb-logo{display:none}
      .sb-toggle{display:none}
      .sb-nav{flex-direction:row;padding:0;gap:0;justify-content:space-around;align-items:center;height:100%}
      .nav-item{flex-direction:column;gap:2px;padding:6px 12px;border-radius:0;min-height:auto;flex:1;justify-content:center;align-items:center}
      .nav-item.active::before{display:none}
      .nav-item.active{background:rgba(245,166,35,.15);border-top:2px solid var(--gold);margin-top:-2px}
      .nav-label{opacity:1!important;width:auto!important;font-size:10px!important;overflow:visible}
      .nav-icon svg{width:20px;height:20px}
      .content{margin-left:0;width:100vw;height:calc(100vh - 60px - env(safe-area-inset-top) - env(safe-area-inset-bottom))}
      .panel-frame{height:calc(100vh - 60px - env(safe-area-inset-top) - env(safe-area-inset-bottom))}
    }
  </style>
</head>
<body>

<nav class="sidebar" id="sidebar" style="display:none">
  <div class="sb-logo" onclick="toggleSidebar()">
    <img src="logo-header.png" alt="MMC">
  </div>

  <div class="sb-nav">
    <div class="nav-item active" data-panel="maquinas" onclick="switchPanel('maquinas')">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
      <span class="nav-label">Plataformas</span>
    </div>
    <div class="nav-item" data-panel="frota" onclick="switchPanel('frota')">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <span class="nav-label">Frota</span>
    </div>
    <div class="nav-item" data-panel="crm" onclick="switchPanel('crm')">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <span class="nav-label">CRM</span>
    </div>
  </div>

  <div class="sb-toggle" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </div>
</nav>

<!-- Login Screen -->
<div id="loginScreen" style="position:fixed;inset:0;z-index:500;background:linear-gradient(135deg,#0f1b3d 0%,#162350 50%,#1E3A8A 100%);display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;width:100%;max-width:360px;padding:20px">
    <img src="logo-header.png" alt="MMC" style="height:60px;margin-bottom:24px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:#fff;margin-bottom:4px">MMC LOCAÇÕES</div>
    <div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:32px">Portal de Gestão</div>
    <input id="loginPass" type="password" placeholder="Senha de acesso" style="width:100%;padding:14px 18px;border:2px solid rgba(255,255,255,.15);border-radius:12px;background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;text-align:center;margin-bottom:14px" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;padding:14px;background:var(--gold);color:var(--navy);border:none;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;cursor:pointer;letter-spacing:.5px">Entrar</button>
    <div id="loginErr" style="color:#ef4444;font-size:13px;margin-top:12px;display:none">Senha incorreta</div>
  </div>
</div>

<main class="content" style="display:none" id="mainContent">
  <iframe class="panel-frame active" id="frame-maquinas" src="about:blank" loading="lazy"></iframe>
  <iframe class="panel-frame" id="frame-frota" src="about:blank" loading="lazy"></iframe>
  <iframe class="panel-frame" id="frame-crm" src="about:blank" loading="lazy"></iframe>
</main>

<script>
const URLS={
  maquinas:'https://mmclocacoesmaquinas.vercel.app?auth=Mmc2026',
  frota:'https://mmc-frota.vercel.app?auth=Mmc2026',
  crm:'https://mmc-crm.vercel.app?auth=Mmc2026'
};
const PASS='Mmc2026';
let loaded={maquinas:false,frota:false,crm:false};
let current='maquinas';

// Check if already logged in
if(sessionStorage.getItem('mmc_portal_auth')==='true') enterPortal();

function doLogin(){
  const p=document.getElementById('loginPass').value;
  if(p===PASS){
    sessionStorage.setItem('mmc_portal_auth','true');
    enterPortal();
  }else{
    document.getElementById('loginErr').style.display='block';
    document.getElementById('loginPass').style.borderColor='#ef4444';
    setTimeout(()=>{document.getElementById('loginErr').style.display='none';document.getElementById('loginPass').style.borderColor='rgba(255,255,255,.15)'},2000);
  }
}

function enterPortal(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('sidebar').style.display='flex';
  document.getElementById('mainContent').style.display='block';
  // Load first panel with editor mode auto-activated
  document.getElementById('frame-maquinas').src=URLS.maquinas;
  loaded.maquinas=true;
}

function switchPanel(name){
  if(current===name)return;
  current=name;
  if(!loaded[name]){
    document.getElementById('frame-'+name).src=URLS[name];
    loaded[name]=true;
  }
  document.querySelectorAll('.panel-frame').forEach(f=>f.classList.remove('active'));
  document.getElementById('frame-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.panel===name));
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

if(window.innerWidth<768){
  document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>{
    setTimeout(()=>document.getElementById('sidebar').classList.remove('open'),200);
  }));
}
</script>
</body>
</html>
